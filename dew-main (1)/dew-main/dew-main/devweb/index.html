<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit - Supere seus limites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3E00;
            --primary-dark: #CC3200;
            --bg-dark: #0A0A0B;
            --bg-card: #161618;
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --border: #27272a;
            --success: #34d399;
            --container-max: 1200px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 100%; scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .skip-link {
            position: absolute; top: -100px; left: 0;
            background: var(--primary); color: white;
            padding: 1rem; z-index: 999; text-decoration: none;
            transition: top 0.3s;
        }
        .skip-link:focus { top: 0; }
        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
            outline: 3px solid var(--primary); outline-offset: 3px;
        }

        /* HEADER */
        .header {
            background-color: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.25rem 0; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .nav-container {
            width: 90%; max-width: var(--container-max);
            margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Oswald', sans-serif; font-size: 1.75rem;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-main); text-decoration: none;
        }
        .logo span { color: var(--primary); }
        .nav-menu { display: none; }
        .nav-list { list-style: none; display: flex; gap: 2rem; }
        .nav-link {
            text-decoration: none; color: var(--text-muted);
            font-weight: 500; transition: var(--transition);
            text-transform: capitalize;
        }
        .nav-link:hover, .nav-link.active { color: var(--primary); }
        @media (min-width: 1024px) { .nav-menu { display: block; } }

        /* MAIN CONTENT - Preenche o espaço entre header e footer */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* HERO PRINCIPAL (HOME) */
        .hero-home {
            padding: 5rem 5% 6rem; 
            text-align: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,62,0,0.12) 0%, transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            flex: 1;
        }
        .hero-home h2 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-transform: uppercase; 
            margin-bottom: 1.25rem; 
            line-height: 1.1;
            max-width: 900px;
        }
        .hero-home h2 span { color: var(--primary); }
        .hero-home p { 
            color: var(--text-muted); 
            font-size: clamp(1rem, 2vw, 1.25rem); 
            max-width: 600px; 
            margin: 0 auto 2.5rem; 
        }

        /* BOTÃO PRINCIPAL */
        .btn-primary {
            display: inline-block; padding: 1.1rem 2.5rem;
            background: var(--primary); border: none;
            color: white; border-radius: 8px; text-decoration: none;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: var(--transition);
        }
        .btn-primary:hover { 
            background: var(--primary-dark); 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(255,62,0,0.2);
        }

        /* ANIMAÇÕES */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anima { animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .delay-1 { animation-delay: 0.15s; opacity: 0; }
        .delay-2 { animation-delay: 0.3s; opacity: 0; }

        /* FOOTER */
        .footer {
            background: #000; padding: 3rem 0;
            text-align: center; border-top: 1px solid var(--border);
            margin-top: auto;
        }
        .footer p { color: var(--text-muted); font-size: 0.875rem; }
    </style>
</head>
<body>

    <a href="#conteudo-principal" class="skip-link">Pular para o conteúdo principal</a>

    <header class="header">
        <nav class="nav-container" aria-label="Navegação Principal">
            <a href="index.html" class="logo" aria-label="GymFit Home">Gym<span>Fit</span></a>
            <div class="nav-menu">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link active" aria-current="page">Início</a></li>
                    <li><a href="sobre.html" class="nav-link">Sobre</a></li>
                    <li><a href="horarios.html" class="nav-link">Horários</a></li>
                    <li><a href="planos.html" class="nav-link">Planos</a></li>
                    <li><a href="pagamento.html" class="nav-link">pagamento</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="conteudo-principal">
        <section class="hero-home" aria-labelledby="hero-titulo">
            <div class="container hero-conteudo">
                <h2 id="hero-titulo" class="anima">Transforme seu corpo,<br><span>mude sua vida</span></h2>
                <p class="anima delay-1">Estrutura de ponta, profissionais qualificados e o ambiente perfeito para o seu treino.</p>
                <a href="planos.html" class="btn-primary anima delay-2">Começar agora</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GymFit. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
